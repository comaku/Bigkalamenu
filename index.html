<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Big Kala Menu</title>

<link rel="icon" href="CO.png">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.1/css/all.min.css">

<style>
@import url("https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap");

/* RESET */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Montserrat', sans-serif;
}

body{
    background:#fff;
    overflow-x:hidden;
}

/* ================= PRELOADER ================= */
#preloader{
    position:fixed;
    width:100%;
    height:100%;
    background:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

.loader{
    width:50px;
    height:50px;
    border:5px solid #eee;
    border-top:5px solid #711def;
    border-radius:50%;
    animation:spin 1s linear infinite;
}

@keyframes spin{
    100%{transform:rotate(360deg);}
}

/* ================= HEADER ================= */
header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 5%;
}

header h1{
    color:#711def;
    font-size:clamp(1.2rem,2vw,1.7rem);
}

.menu{
    display:flex;
    align-items:center;
}

.menu-list{
    display:flex;
    list-style:none;
}

.menu-list li{
    margin-left:25px;
}

.menu-list a{
    text-decoration:none;
    color:#711def;
    font-weight:500;
}

.menu-list li:hover{
    color:#ff5360;
}

.menu button{
    display:none;
    background:none;
    border:none;
    font-size:1.6rem;
    color:#711def;
    cursor:pointer;
}

/* ================= MAIN ================= */
.main{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:40px 5%;
    gap:40px;
}

.left{
    flex:1;
}

.title{
    font-size:clamp(2rem,4vw,3rem);
    color:#ff5360;
    margin-bottom:20px;
}

.msg{
    font-size:clamp(0.9rem,1.2vw,1.1rem);
    color:#9fb5cc;
    line-height:1.6;
    margin-bottom:25px;
}

.cta{
    background:#711def;
    color:#fff;
    padding:12px 25px;
    border-radius:25px;
    border:none;
    cursor:pointer;
}

.cta a{
    color:#fff;
    text-decoration:none;
}

.right{
    flex:1;
    display:flex;
    justify-content:center;
}

.right img{
    width:100%;
    max-width:450px;
}

/* ================= TABLET ================= */
@media(max-width:900px){
    .main{
        flex-direction:column;
        text-align:center;
    }

    .right img{
        max-width:350px;
    }
}

/* ================= MOBILE ================= */
@media(max-width:650px){

    .menu button{
        display:block;
    }

    .menu-list{
        position:fixed;
        top:0;
        right:0;
        width:75%;
        height:100%;
        background:#711def;
        flex-direction:column;
        padding-top:80px;
        transform:translateX(100%);
        transition:0.4s;
    }

    .menu.opened .menu-list{
        transform:translateX(0);
    }

    .menu-list li{
        margin:20px;
    }

    .menu-list a{
        color:#fff;
        font-size:1.2rem;
    }
}
</style>
</head>

<body>

<!-- PRELOADER -->
<div id="preloader">
    <div class="loader"></div>
</div>

<header>
    <h1>BIG KALA MENU</h1>

    <div class="menu">
        <ul class="menu-list">
            <li><a href="#">Home</a></li>
            <li><a href="yu.html">Order</a></li>
            <li><a href="ju.html">Service</a></li>
        </ul>

        <button id="menuBtn">
            <i class="fas fa-bars"></i>
        </button>
    </div>
</header>

<section class="main">

    <div class="left">
        <h2 class="title">Delivery Service</h2>
        <p class="msg">
            Welcome to Big Kala Menu, where every dish is a Taste Of Goodness!
            We deliver delicious pasta straight to your hostel.
        </p>
        <button class="cta">
            <a href="yu.html">BOOK NOW</a>
        </button>
    </div>

    <div class="right">
        <img src="pasta.png" alt="Pasta">
    </div>

</section>

<script>
// MENU TOGGLE
const menu = document.querySelector('.menu');
const menuBtn = document.getElementById('menuBtn');

menuBtn.addEventListener('click', () => {
    menu.classList.toggle('opened');
});

// PRELOADER
window.addEventListener("load", () => {
    const loader = document.getElementById("preloader");
    loader.style.opacity = "0";
    loader.style.transition = "0.5s";

    setTimeout(() => {
        loader.style.display = "none";
    }, 500);
});
</script>

</body>
</html>
