<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="CO.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500&display=swap" rel="stylesheet">
    <title>Big Kala Menu</title>

<style>
@import url("https://fonts.googleapis.com/css2?family=Montserrat:wght@100;200;300;400;500;600;700;800;900&display=swap");

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Montserrat', sans-serif;
}

body {
    min-height: 100vh;
    width: 100%;
    background-color: #fff;
    display: flex;
    flex-direction: column;
}

header {
    color: #711def;
    height: 80px;
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 64px;
}

header h1 {
    text-transform: uppercase;
    font-size: 1.7em;
}

header a {
    text-decoration: none;
    color: #711def;
}

.menu {
    display: flex;
}

.menu button {
    display: none;
}

.menu-list {
    list-style: none;
    display: flex;
}

.menu-list li {
    margin-left: 32px;
    cursor: pointer;
}

.menu-list li.active,
.menu-list li:hover {
    color: #ff5360;
}

.main {
    flex: 1;
    display: flex;
    align-items: center;
}

.right img {
    width: 100%;
}

.left {
    max-width: 45%;
    padding: 40px 64px;
}

.right {
    padding: 40px 48px;
}

.title {
    color: #ff5360;
    font-size: 3em;
    margin-bottom: 20px;
}

.msg {
    color: #9fb5cc;
    margin-bottom: 20px;
}

button.cta {
    background-color: #711def;
    color: white;
    padding: 15px 25px;
    border-radius: 30px;
    cursor: pointer;
    border: none;
}

button.cta a {
    color: white;
    text-decoration: none;
}

/* MOBILE */
@media (max-width: 650px) {

    .main {
        flex-direction: column;
    }

    .menu button {
        display: block;
        background: none;
        border: none;
        font-size: 1.5em;
        cursor: pointer;
    }

    .menu-list {
        position: fixed;
        right: 0;
        top: 0;
        width: 70%;
        height: 100%;
        background: #711def;
        flex-direction: column;
        transform: translateX(100%);
        transition: 0.3s;
        padding-top: 80px;
    }

    .menu.opened .menu-list {
        transform: translateX(0);
    }

    .menu-list li {
        margin: 20px;
        color: white;
    }
}
</style>
</head>

<body>

<header>
    <h1>BIG KALA MENU</h1>

    <section class="menu">
        <ul class="menu-list">
            <li class="active">Home</li>
            <li><a href="yu.html">Order</a></li>
            <li><a href="ju.html">Service</a></li>
        </ul>

        <button id="menuBtn">
            <i class="fas fa-bars"></i>
        </button>
    </section>
</header>

<section class="main">

    <section class="left">
        <p class="title">Delivery Service</p>
        <p class="msg">
            Welcome to Big Kala Menu, where every dish is a Taste Of Goodness!
        </p>
        <button class="cta"><a href="yu.html">BOOK NOW</a></button>
    </section>

    <section class="right">
        <img src="pasta.png" alt="Landing image">
    </section>

</section>

<script>
const menu = document.querySelector('.menu');
const menuBtn = document.getElementById('menuBtn');

menuBtn.addEventListener('click', () => {
    menu.classList.toggle('opened');
});
</script>

</body>
</html>
